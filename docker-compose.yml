services:
  api:
    build: ./backend
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/cats.db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${PUBLIC_PORT:-8900}:80"
    volumes:
      - ./backend/data/images:/usr/share/nginx/html/images:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  sync:
    build: ./backend
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/cats.db
    command: python sync.py
    profiles:
      - sync
