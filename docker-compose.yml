services:
  api:
    build: ./backend
    container_name: cat-app-api
    ports:
      - "8900:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/cats.db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cat-app-images
    ports:
      - "8901:80"
    volumes:
      - ./backend/data/images:/usr/share/nginx/html/images:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  sync:
    build: ./backend
    container_name: cat-app-sync
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/cats.db
    command: python sync.py
    profiles:
      - sync
