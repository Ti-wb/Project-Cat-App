server {
    listen 80;

    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    location /health {
        return 200 'nginx ok';
        add_header Content-Type text/plain;
    }
}
